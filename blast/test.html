<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLAST Job Submission Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            font-family: monospace;
        }
        textarea {
            min-height: 100px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f4f4f4;
            border-left: 4px solid #4CAF50;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error {
            border-left-color: #f44336;
            background-color: #ffebee;
        }
        .info {
            background-color: #e3f2fd;
            border-left-color: #2196F3;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>BLAST Job Submission API Test</h1>
    
    <div class="info">
        <strong>Note:</strong> This is a test interface for the BLAST job submission API. 
        Jobs are executed asynchronously in the background. After submission, the job status will be polled automatically.
    </div>

    <form id="blastForm">
        <div class="form-group">
            <label for="blastexe">BLAST Executable:</label>
            <select id="blastexe" name="blastexe" required>
                <option value="blastn">blastn (Nucleotide-Nucleotide)</option>
                <option value="blastp">blastp (Protein-Protein)</option>
                <option value="blastx">blastx (Translated Nucleotide vs Protein)</option>
                <option value="tblastn">tblastn (Protein vs Translated Nucleotide)</option>
                <option value="tblastx">tblastx (Translated Nucleotide vs Translated Nucleotide)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="query">Query Sequence:</label>
            <textarea id="query" name="query" required placeholder="Enter DNA or protein sequence...">ATCGATCGATCGATCGATCGATCGATCGATCG</textarea>
        </div>

        <div class="form-group">
            <label for="database">Database (optional):</label>
            <input type="text" id="database" name="database" placeholder="e.g., TaFielder">
        </div>

        <div class="form-group">
            <label for="evalue">E-value (optional):</label>
            <input type="text" id="evalue" name="evalue" placeholder="1e-5">
        </div>

        <div class="form-group">
            <label for="maxHits">Max Hits (optional):</label>
            <input type="number" id="maxHits" name="maxHits" placeholder="10">
        </div>

        <button type="submit">Submit Job</button>
        <button type="button" onclick="clearResults()">Clear Results</button>
    </form>

    <div id="result"></div>

    <hr style="margin: 40px 0;">

    <h2>Get Job Status</h2>
    <form id="statusForm">
        <div class="form-group">
            <label for="jobId">Job ID:</label>
            <input type="text" id="jobId" name="jobId" placeholder="job_1709000000_a1b2c3d4" required>
        </div>
        <button type="submit">Get Status</button>
    </form>

    <div id="statusResult"></div>

    <script>
        let pollInterval = null;

        // Submit BLAST job
        document.getElementById('blastForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<div class="result">Submitting job...</div>';
            
            try {
                const response = await fetch('submit_job.php', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const resultsLink = data.resultsUrl ? 
                        `<br>Results: <a href="../${data.resultsUrl}" target="_blank">View Results</a>` : 
                        '';
                    resultDiv.innerHTML = `
                        <div class="result">
<strong>Success!</strong>
Job ID: ${data.jobId}
Status: ${data.status}
${resultsLink}

Full Response:
${JSON.stringify(data, null, 2)}
                        </div>
                    `;
                    // Auto-fill the job ID in the status form
                    document.getElementById('jobId').value = data.jobId;
                    
                    // If status is running, start polling
                    if (data.status === 'running') {
                        resultDiv.innerHTML += '<div class="result" style="margin-top:10px;">Polling for job completion...</div>';
                        startPolling(data.jobId, resultDiv);
                    }
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
<strong>Error:</strong>
${data.error || 'Unknown error'}
${data.message ? '\nMessage: ' + data.message : ''}

Full Response:
${JSON.stringify(data, null, 2)}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
<strong>Request Failed:</strong>
${error.message}
                    </div>
                `;
            }
        });

        // Start polling for job completion
        function startPolling(jobId, resultDiv) {
            // Clear any existing polling
            if (pollInterval) {
                clearInterval(pollInterval);
            }
            
            let pollCount = 0;
            const maxPolls = 60; // Poll for max 5 minutes (60 * 5 seconds)
            
            pollInterval = setInterval(async () => {
                pollCount++;
                
                try {
                    const response = await fetch(`get_job.php?jobId=${encodeURIComponent(jobId)}`);
                    const data = await response.json();
                    
                    if (data.success && data.job) {
                        const status = data.job.status;
                        
                        if (status === 'completed') {
                            clearInterval(pollInterval);
                            const resultsLink = data.job.resultsUrl ? 
                                `<br><br><strong>Results:</strong> <a href="../${data.job.resultsUrl}" target="_blank">View BLAST Results</a>` : 
                                '';
                            resultDiv.innerHTML = `
                                <div class="result">
<strong>Job Completed!</strong>
Job ID: ${data.job.jobId}
Status: ${status}
Created: ${data.job.created}
Completed: ${data.job.completed || 'N/A'}
${resultsLink}

Full Job Data:
${JSON.stringify(data.job, null, 2)}
                                </div>
                            `;
                            document.getElementById('statusResult').innerHTML = resultDiv.innerHTML;
                        } else if (status === 'failed') {
                            clearInterval(pollInterval);
                            resultDiv.innerHTML = `
                                <div class="result error">
<strong>Job Failed!</strong>
Job ID: ${data.job.jobId}
Status: ${status}
Error: ${data.job.error || 'Unknown error'}

Full Job Data:
${JSON.stringify(data.job, null, 2)}
                                </div>
                            `;
                            document.getElementById('statusResult').innerHTML = resultDiv.innerHTML;
                        } else {
                            // Still running - update poll count
                            const pollMsg = resultDiv.querySelector('.result:last-child');
                            if (pollMsg) {
                                pollMsg.innerHTML = `Polling for job completion... (${pollCount}/${maxPolls})`;
                            }
                        }
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
                
                // Stop polling after max attempts
                if (pollCount >= maxPolls) {
                    clearInterval(pollInterval);
                    resultDiv.innerHTML += `
                        <div class="result error" style="margin-top:10px;">
<strong>Polling Timeout</strong>
Job may still be running. Check status manually using the form below.
                        </div>
                    `;
                }
            }, 5000); // Poll every 5 seconds
        }

        // Get job status
        document.getElementById('statusForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jobId = document.getElementById('jobId').value;
            const resultDiv = document.getElementById('statusResult');
            
            resultDiv.innerHTML = '<div class="result">Fetching job status...</div>';
            
            try {
                const response = await fetch(`get_job.php?jobId=${encodeURIComponent(jobId)}`);
                const data = await response.json();
                
                if (data.success) {
                    const resultsLink = data.job.resultsUrl ? 
                        `<br><br><strong>Results:</strong> <a href="../${data.job.resultsUrl}" target="_blank">View BLAST Results</a>` : 
                        '';
                    resultDiv.innerHTML = `
                        <div class="result">
<strong>Job Found!</strong>
${resultsLink}

${JSON.stringify(data.job, null, 2)}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
<strong>Error:</strong>
${data.error}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
<strong>Request Failed:</strong>
${error.message}
                    </div>
                `;
            }
        });

        function clearResults() {
            // Stop any active polling
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            document.getElementById('result').innerHTML = '';
            document.getElementById('statusResult').innerHTML = '';
        }
    </script>
</body>
</html>
